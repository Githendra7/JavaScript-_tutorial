<!DOCTYPE html>
<html>
<head>
    <title>For Loop</title>
</head>
<body>
    <h2>The For Loop</h2>

    <script type="text/javascript">
        document.write("<h3>Counting from 0 to 9</h3>");
        for (var i = 0; i <= 9; i++) {
            document.write(i + "<br />");
        }
    </script>
</body>
</html>
