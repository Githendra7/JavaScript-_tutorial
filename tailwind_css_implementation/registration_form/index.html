<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Tailwind CSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .form-section {
            scroll-margin-top: 2rem;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased pb-20">

    <div class="bg-indigo-600 text-white py-12 px-6 shadow-lg mb-8">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl font-extrabold tracking-tight">Student Registration</h1>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4">

        <form name="registrationForm" id="registrationForm" onsubmit="return validateForm(event)" class="space-y-8">

            <section id="personal"
                class="form-section bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-8 py-4 border-b border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800">Personal Information</h2>
                </div>
                <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">First Name *</label>
                        <input type="text" name="firstName"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Middle Name</label>
                        <input type="text" name="middleName"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Last Name *</label>
                        <input type="text" name="lastName"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Date of Birth *</label>
                        <input type="date" name="dob"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Gender *</label>
                        <div class="flex gap-6 pt-1">
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" name="gender" value="Male"
                                    class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="text-slate-600 group-hover:text-indigo-600 transition">Male</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="radio" name="gender" value="Female"
                                    class="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-slate-300">
                                <span class="text-slate-600 group-hover:text-indigo-600 transition">Female</span>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Blood Group *</label>
                        <select name="bloodGroup"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none bg-white">
                            <option value="">Select Group</option>
                            <option>A+</option>
                            <option>B+</option>
                            <option>O+</option>
                            <option>AB+</option>
                            <option>A-</option>
                            <option>B-</option>
                            <option>O-</option>
                            <option>AB-</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nationality *</label>
                        <input type="text" name="nationality"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Religion</label>
                        <input type="text" name="religion"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Aadhar Number *</label>
                        <input type="text" name="aadhar" maxlength="12"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none"
                            placeholder="12-digit number">
                    </div>
                </div>
            </section>

            <section id="contact"
                class="form-section bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-8 py-4 border-b border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800">Contact Details</h2>
                </div>
                <div class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address *</label>
                            <input type="email" name="email"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number *</label>
                            <input type="text" name="phone" maxlength="10"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-1">
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Alternate Phone</label>
                            <input type="text" name="altPhone"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Emergency Contact Name
                                *</label>
                            <input type="text" name="emergencyName"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Emergency Contact Phone
                                *</label>
                            <input type="text" name="emergencyPhone" maxlength="10"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Permanent Address *</label>
                        <textarea name="address1" rows="3"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">City *</label>
                            <input type="text" name="city"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">State *</label>
                            <input type="text" name="state"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Pincode *</label>
                            <input type="text" name="pincode" maxlength="6"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Academic Information -->
            <section id="academic"
                class="form-section bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-8 py-4 border-b border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800">Academic Details</h2>
                </div>
                <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Course *</label><input
                            type="text" name="course"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 transition outline-none">
                    </div>
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Department *</label><input
                            type="text" name="department"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 transition outline-none">
                    </div>
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Year of Study *</label><input
                            type="text" name="year"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 transition outline-none">
                    </div>
                    <div><label class="block text-sm font-semibold text-slate-700 mb-1">Roll Number *</label><input
                            type="text" name="roll"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 transition outline-none">
                    </div>
                    <div class="md:col-span-2"><label class="block text-sm font-semibold text-slate-700 mb-1">Previous
                            School/College *</label><input type="text" name="school"
                            class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 transition outline-none">
                    </div>
                </div>
            </section>

            <!-- Family & Other -->
            <section id="other"
                class="form-section bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50 px-8 py-4 border-b border-slate-200">
                    <h2 class="text-xl font-bold text-slate-800">Family & Additional Info</h2>
                </div>
                <div class="p-8 space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">Father's Name
                                *</label><input type="text" name="fatherName"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 transition outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">Mother's Name
                                *</label><input type="text" name="motherName"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 transition outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div><label class="block text-sm font-semibold text-slate-700 mb-1">Annual Income
                                *</label><input type="number" name="income"
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-300 transition outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <label class="block text-sm font-bold text-slate-700 mb-3">Hostel Required? *</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="hostel"
                                        value="Yes" class="text-indigo-600"> <span>Yes</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="hostel"
                                        value="No" class="text-indigo-600"> <span>No</span></label>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <label class="block text-sm font-bold text-slate-700 mb-3">Transport Required? *</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio"
                                        name="transport" value="Yes" class="text-indigo-600"> <span>Yes</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio"
                                        name="transport" value="No" class="text-indigo-600"> <span>No</span></label>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <label class="block text-sm font-bold text-slate-700 mb-3">Scholarship? *</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio"
                                        name="scholarship" value="Yes" class="text-indigo-600"> <span>Yes</span></label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="radio"
                                        name="scholarship" value="No" class="text-indigo-600"> <span>No</span></label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <button type="submit"
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
                    Submit Application
                </button>
            </div>

        </form>

    </div>

    <script src="script.js"></script>
</body>

</html>
