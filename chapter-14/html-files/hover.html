<!DOCTYPE html>
<html>
<head>
    <title>Hover Effects</title>

    <style>
        .hover-btn {
            background-color: lightblue;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button 
        class="hover-btn"
        onmouseover="this.style.backgroundColor='orange'" 
        onmouseout="this.style.backgroundColor='lightblue'">
        Hover Me
    </button>

</body>
</html>
