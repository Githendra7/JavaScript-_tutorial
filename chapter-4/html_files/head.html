<!DOCTYPE html>
<html>
<head>
    <title>Head Script Demo</title>
    <script type="text/javascript">
        function greetUser() {
            alert("Welcome from head.");
        }
    </script>
</head>
<body>
    <h2>Head Script Placement</h2>
    <p>Press the button to trigger the event.</p>
    <button onclick="greetUser()">Trigger Alert</button>
</body>
</html>
