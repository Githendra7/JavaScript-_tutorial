<!DOCTYPE html>
<html>
<head>
    <title>Datatypes and Untyped variables</title>
</head>
<body>
    <h2>Datatypes</h2>
    <script type="text/javascript">
        var integerNum = 256; 
        var floatNum = 99.99;
        var sciNum = 2.5e3; 

        var singleQuote = 'Hello';
        var doubleQuote = "World";
        var escapedString = "It\'s a beautiful day \n Tomorrow will be too!";

        var isInternshipFun = true;
        var isTired = false;

        

        var emptyValue = null;  
        var notYetAssigned;  
       
        var studentObject = { firstName: "Ramesh", course: "CSE" };

        

        var dynamicVar = 100; 
        document.write("<p>Initial type: " + typeof dynamicVar + " Value: " + dynamicVar + "</p>");
        
        dynamicVar = "String"; 
        document.write("<p>Changed type: " + typeof dynamicVar + " Value: " + dynamicVar + "</p>");
        
        dynamicVar = true; 
        document.write("<p>Changed type: " + typeof dynamicVar + " Value: " + dynamicVar + "</p>");
        
        dynamicVar = null; 
        document.write("<p>Changed type: " + typeof dynamicVar + " Value: " + dynamicVar + "</p>");
    </script>
</body>
</html>
