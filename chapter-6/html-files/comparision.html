<!DOCTYPE html>
<html>
<head>
    <title>Comparison Operators</title>
</head>
<body>
    <h2>Comparison Operators</h2>
    <script type="text/javascript">
        var num = 5;
        var strNum = "5";
        var larger = 10;

        document.write("<p><b>Variables:</b> num = 5, strNum = '5', larger = 10</p>");
        document.write("Equal: " + (num == strNum) + "<br />");
        document.write("Strict Equal (===): " + (num === strNum) + "<br />");
        document.write("Not Equal : " + (larger != num) + "<br />");
        document.write("Greater than : " + (larger > num) + "<br />");
        document.write("Less than : " + (num < larger) + "<br />");
        document.write("Greater than or equal : " + (num >= 5) + "<br />");
        document.write("Less than or equal : " + (larger <= 5) + "<br />");
    </script>
</body>
</html>
