<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operators</title>
</head>
<body>
    <h2>Arithmetic Operators</h2>
    
    <script type="text/javascript">
        var x = 50;
        var y = 8;
        var label = " Total";
        
        document.write("<h3>Initial Values: x = " + x + " , y = " + y + "</h3>");

        document.write("<b>Addition (x + y):</b> " + (x + y) + "<br />");
        document.write("<b>Concatenation (x + y + label):</b> " + (x + y + label) + "<br />");
        
    
        document.write("<b>Special Case ('a' + 10):</b> " + ("a" + 10) + "<br />");
        document.write("<b>Subtraction (x - y):</b> " + (x - y) + "<br />");
        document.write("<b>Multiplication (x * y):</b> " + (x * y) + "<br />");
        document.write("<b>Division (x / y):</b> " + (x / y) + "<br />");
        document.write("<b>Modulus (x % y):</b> " + (x % y) + "<br /><br />");

        document.write("<b>Post-increment (x++):</b> " + (x++) + "<br />");
        document.write("<b>Pre-increment (++x):</b> " + (++x) + " <br />");
        document.write("<b>Post-decrement (y--):</b> " + (y--) + "<br />");
        document.write("<b>Pre-decrement (--y):</b> " + (--y) + "<br />");
    </script>

</body>
</html>
