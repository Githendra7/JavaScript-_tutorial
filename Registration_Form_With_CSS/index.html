<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Student Registration</h1>
        </header>

        <div class="form-content">
            <form name="registrationForm" onsubmit="return validateForm()">
                <!-- form sections go here -->

                <section id="personal">
                    <h2>Personal Details</h2>
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" name="firstName">
                    </div>

                    <div class="form-group">
                        <label>Middle Name</label>
                        <input type="text" name="middleName">
                    </div>

                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" name="lastName">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="dob">
                    </div>

                    <div class="form-group">
                        <label>Gender *</label>
                        <div class="radio-group-container">
                            <label class="inline">
                                <input type="radio" name="gender" value="Male"> Male
                            </label>
                            <label class="inline">
                                <input type="radio" name="gender" value="Female"> Female
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Blood Group *</label>
                        <select name="bloodGroup">
                            <option value="">Select</option>
                            <option>A+</option>
                            <option>B+</option>
                            <option>O+</option>
                            <option>AB+</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Nationality *</label>
                        <input type="text" name="nationality">
                    </div>

                    <div class="form-group">
                        <label>Religion</label>
                        <input type="text" name="religion">
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category">
                            <option value="">Select</option>
                            <option>General</option>
                            <option>OBC</option>
                            <option>SC</option>
                            <option>ST</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Aadhar Number *</label>
                        <input type="text" name="aadhar">
                    </div>
                </section>

                <section id="contact">
                    <h2>Contact Details</h2>
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" name="email">
                    </div>

                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="text" name="phone">
                    </div>

                    <div class="form-group">
                        <label>Alternate Phone</label>
                        <input type="text" name="altPhone">
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact Name *</label>
                        <input type="text" name="emergencyName">
                    </div>

                    <div class="form-group">
                        <label>Emergency Contact Phone *</label>
                        <input type="text" name="emergencyPhone">
                    </div>

                    <div class="form-group">
                        <label>Address Line 1 *</label>
                        <textarea name="address1" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Address Line 2</label>
                        <textarea name="address2" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" name="city">
                    </div>

                    <div class="form-group">
                        <label>State *</label>
                        <input type="text" name="state">
                    </div>

                    <div class="form-group">
                        <label>Pincode *</label>
                        <input type="text" name="pincode">
                    </div>
                </section>

                <section id="academic">
                    <h2>Academic Information</h2>
                    <div class="form-group"><label>Course *</label><input type="text" name="course"></div>
                    <div class="form-group"><label>Department *</label><input type="text" name="department"></div>
                    <div class="form-group"><label>Specialization</label><input type="text" name="specialization"></div>
                    <div class="form-group"><label>Year of Study *</label><input type="text" name="year"></div>
                    <div class="form-group"><label>Semester *</label><input type="text" name="semester"></div>
                    <div class="form-group"><label>Roll Number *</label><input type="text" name="roll"></div>
                    <div class="form-group"><label>Registration Number *</label><input type="text" name="regNo"></div>
                    <div class="form-group"><label>Previous School *</label><input type="text" name="school"></div>
                    <div class="form-group"><label>Previous Board *</label><input type="text" name="board"></div>
                    <div class="form-group"><label>Percentage *</label><input type="text" name="percentage"></div>
                </section>

                <section id="family">
                    <h2>Family Information</h2>
                    <div class="form-group"><label>Father's Name *</label><input type="text" name="fatherName"></div>
                    <div class="form-group"><label>Father's Occupation *</label><input type="text"
                            name="fatherOccupation"></div>
                    <div class="form-group"><label>Father's Phone *</label><input type="text" name="fatherPhone"></div>
                    <div class="form-group"><label>Mother's Name *</label><input type="text" name="motherName"></div>
                    <div class="form-group"><label>Mother's Occupation</label><input type="text"
                            name="motherOccupation"></div>
                    <div class="form-group"><label>Mother's Phone</label><input type="text" name="motherPhone"></div>
                    <div class="form-group"><label>Guardian Name</label><input type="text" name="guardianName"></div>
                    <div class="form-group"><label>Guardian Phone</label><input type="text" name="guardianPhone"></div>
                    <div class="form-group"><label>Annual Income *</label><input type="number" name="income"></div>
                    <div class="form-group"><label>Number of Siblings</label><input type="number" name="siblings"></div>
                </section>

                <section id="additional">
                    <h2>Other Information</h2>
                    <div class="form-group">
                        <label>Hostel Required *</label>
                        <div class="radio-group-container">
                            <label class="inline"><input type="radio" name="hostel" value="Yes"> Yes</label>
                            <label class="inline"><input type="radio" name="hostel" value="No"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Transport Required *</label>
                        <div class="radio-group-container">
                            <label class="inline"><input type="radio" name="transport" value="Yes"> Yes</label>
                            <label class="inline"><input type="radio" name="transport" value="No"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Scholarship *</label>
                        <div class="radio-group-container">
                            <label class="inline"><input type="radio" name="scholarship" value="Yes"> Yes</label>
                            <label class="inline"><input type="radio" name="scholarship" value="No"> No</label>
                        </div>
                    </div>

                    <div class="form-group"><label>Sports Interest</label><input type="text" name="sports"></div>
                    <div class="form-group"><label>Hobbies</label><input type="text" name="hobbies"></div>
                    <div class="form-group"><label>Languages Known</label><input type="text" name="languages"></div>

                    <div class="form-group">
                        <label>Laptop Available *</label>
                        <div class="radio-group-container">
                            <label class="inline"><input type="radio" name="laptop" value="Yes"> Yes</label>
                            <label class="inline"><input type="radio" name="laptop" value="No"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Internet Access *</label>
                        <div class="radio-group-container">
                            <label class="inline"><input type="radio" name="internet" value="Yes"> Yes</label>
                            <label class="inline"><input type="radio" name="internet" value="No"> No</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Medical Condition (if any)</label>
                        <textarea name="medical" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="inline">
                            <input type="checkbox" name="declaration">
                            I declare that all details provided are correct.
                        </label>
                    </div>

                    <div class="button-group">
                        <button type="submit">Submit Form</button>
                        <button type="reset">Reset</button>
                    </div>

                </section>

            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
