<!DOCTYPE html>
<html>
<head>
    <title>While Loop</title>
</head>
<body>
    <h2>While Loop</h2>

    <script type="text/javascript">
        document.write("<h3>Factorial of 5</h3>");
        var factorNum = 5;
        var factorialResult = 1;
        while (factorNum > 0) {
            factorialResult *= factorNum;
            factorNum--; 
        }
        document.write("<p>5 factorial = <b>" + factorialResult + "</b></p>");
    </script>
</body>
</html>
