<!DOCTYPE html>
<html>
<head>
    <title>Do-While Loop</title>
</head>
<body>
    <h2>Do-While Loop</h2>

    <script type="text/javascript">
        document.write("<h3>Execute At Least Once Demo</h3>");
        var falseCondition = 50;
        
        do {
            document.write("<p>This statement prints even though " + falseCondition + " is NOT less than 10</p>");
            falseCondition++;
        } while (falseCondition < 10);

    </script>
</body>
</html>
