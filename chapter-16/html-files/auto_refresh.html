<!DOCTYPE html>
<html>
<head>
    <title>Auto Refresh Timer</title>
    <script type="text/javascript">
        var timeLeft = 6; 

        function startTimer() {
            setInterval(function() {
                timeLeft--;
                document.getElementById("countdown").innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    location.reload(true);
                }
            }, 1000); 
        }
    </script>
</head>
<body onload="startTimer()">
    <h2>Auto-Refreshing Page</h2>
    <p>This page will reload in <b id="countdown">6</b> seconds.</p>
</body>
</html>
