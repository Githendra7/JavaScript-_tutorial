<!DOCTYPE html>
<html>
<head>
    <title>Page Redirection</title>
    <script type="text/javascript">
        function redirectToSite() {
            window.location = "https://www.google.com";
        }
    </script>
</head>
<body>
    <h2>Redirection</h2>
    <p>Click the button to go to google.</p>
    <button onclick="redirectToSite()">Go to Google</button>
</body>
</html>
