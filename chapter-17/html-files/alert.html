<!DOCTYPE html>
<html>
<head>
    <title>Alert Dialog Demo</title>
    <script>
        function triggerAlert() {
            alert("Warning: This action cannot be undone!");
        }
    </script>
</head>
<body>
    <h2>Alert Box</h2>
    <button onclick="triggerAlert()">Show Alert</button>
</body>
</html>
